name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint and format checks (pre-commit)
        run: uvx pre-commit run --all-files

      - name: Run unit tests
        run: uv run pytest tests/unit api/tests

  # The eval gate (real OpenAI embeddings + LLM judge over the KB fixture) is run
  # out-of-band, not on every push — it needs live API credits and re-embeds the
  # whole KB. Run it locally / on the VPS with `make eval` before releases.
