name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint and format checks (pre-commit)
        run: uvx pre-commit run --all-files

      - name: Run unit tests
        run: uv run pytest tests/unit api/tests

  eval:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.0
        ports:
          - 6333:6333

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      QDRANT_URL: http://localhost:6333
      APP_ENV: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Load eval fixture into Qdrant
        run: make load-only INPUT_FILE=tests/eval/fixtures/synthesis_results.jsonl

      - name: Run eval gate
        run: make eval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: tests/eval/report.json
