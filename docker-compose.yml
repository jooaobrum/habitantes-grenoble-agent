version: "3.8"

services:
  # ── Vector Store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    expose:
      - "6333"
    volumes:
      - ./infra/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET / HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q qdrant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - CONFIG_DIR=/app/config
      - APP_ENV=${APP_ENV:-dev}
      # Pin the control-store SQLite db onto the mounted ./artifacts volume.
      # Without this it resolves to /artifacts (container root, ephemeral) and
      # every rebuild wipes the switch/thresholds/alerts. See control_store.py.
      - CONTROL_DB_PATH=/app/artifacts/control/control.db
      # .env's QDRANT_URL is a local-dev-only override (host running outside
      # Docker); force the in-network hostname here so it always wins over
      # env_file, regardless of what a developer's .env sets.
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./artifacts:/app/artifacts
    command: uv run uvicorn habitantes.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --workers 1

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - CONFIG_DIR=/app/config
      - APP_ENV=${APP_ENV:-dev}
      # .env's API_URL is a local-dev-only override (host running outside
      # Docker); force the in-network hostname here so it always wins over
      # env_file, regardless of what a developer's .env sets.
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./config:/app/config
    command: uv run python /app/app/telegram_bot.py

  # ── WhatsApp Bot (Baileys, Node) ──────────────────────────────────────────
  whatsapp-bot:
    build:
      context: .
      dockerfile: app/whatsapp_bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - CONFIG_DIR=/app/config
      - API_URL=http://api:8000          # in-network host wins over .env
      # ADMIN_TOKEN + WHATSAPP_ID_SALT come from .env (heartbeat auth + JID hashing)
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./config:/app/config             # read base.yaml
      - ./artifacts:/app/artifacts       # persist auth session (git-ignored)

networks:
  default:
    name: expat-network
