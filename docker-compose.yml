version: '3.8'

services:
  # ── Vector Store ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./infra/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
    command: uvicorn habitantes.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./app:/app
    command: python /app/telegram_bot.py

networks:
  default:
    name: expat-network
