# ── Environment Specifics ─────────────────────────────────────────────────────
environments:
  dev:
    vector_store:
      collection_name: "habitantes_qa_chat_kb"
    api:
      log_level: "DEBUG"
    ingestion:
      collection_name: "habitantes_qa_chat_kb"
      overwrite_collection: false

  prod:
    vector_store:
      collection_name: "habitantes_qa_chat_kb"
    api:
      log_level: "WARNING"
    ingestion:
      collection_name: "habitantes_qa_chat_kb"
      overwrite_collection: false

# ── Ingestion Pipeline ────────────────────────────────────────────────────────
ingestion:
  data_dir: "data"
  artifacts_dir: "artifacts"
  input_file: "chat-19012021-20022026.txt"
  parser:
    timestamp_format: "%d/%m/%y, %H:%M:%S"
  qa:
    thread_gap_h: 3
    answer_window_h: 2
    context_window: 5
    tier_high: 50
    tier_medium: 20
  synthesis:
    prompt_path: "ingestion/prompts/synthesis_prompt.txt"
    model: "gpt-4o-mini"
    temperature: 0.2
    max_retries: 4
    retry_base_sleep_s: 1.5
    start_time: "2024-02-15T00:00:00"
    end_time: "2027-12-31T23:59:59"
    overwrite: true
  load:
    dense_batch_size: 64
    qdrant_upsert_batch: 128
    save_concat_jsonl: true # Whether to save the final filtered concat file
