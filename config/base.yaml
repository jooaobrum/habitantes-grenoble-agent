# ── Global Defaults ──────────────────────────────────────────────────────────
llm:
  # Chat/completions via OpenRouter. model_name is a `provider/model` OpenRouter
  # id — swap models here (or via MODEL_NAME env) with no code change.
  model_name: "google/gemini-2.5-flash-lite"
  base_url: "https://openrouter.ai/api/v1"
  # Judge model for eval (answer_relevance/faithfulness) — one tier above the
  # chat model for better judgment quality, still cheap.
  judge_model_name: "google/gemini-2.5-flash"
  # Embeddings stay on OpenAI (OpenRouter has no embeddings endpoint).
  embedding_model_name: "text-embedding-3-small"

vector_store:
  qdrant_url: "http://qdrant:6333"
  qdrant_timeout_seconds: 3

api:
  rate_limit_per_hour: 100
  max_tokens_per_response: 1024
  request_timeout_seconds: 30
  openai_timeout_seconds: 8

telegram:
  api_url: "http://api:8000"
  rate_limit_per_minute: 5
  max_message_length: 2000

# ── WhatsApp (Baileys) channel — DM-only 2nd channel ─────────────────────────
# Thin adapter (Node service, app/whatsapp_bot/). Mirrors telegram:; the adapter
# owns these settings (the Python API does not read this block).
whatsapp:
  api_url: "http://api:8000" # forced by docker-compose env (in-network host)
  rate_limit_per_minute: 5
  max_message_length: 2000
  reconnect_base_delay_ms: 2000
  reconnect_max_delay_ms: 60000
  reply_min_delay_ms: 600 # human-like pacing (randomized up to max)
  reply_max_delay_ms: 1800
  auth_dir: "artifacts/whatsapp/auth"
  heartbeat_interval_seconds: 30
  # chat_id = hash(JID). Salt is env-only (WHATSAPP_ID_SALT) so hashes are not
  # reversible via a rainbow table of phone numbers. Never a plaintext default here.
  id_hash_length: 16 # hex chars kept from the SHA-256 digest
  # Gratitude replies that count as a 👍 on the last answer. Matched on a
  # normalized (lowercased, accent-stripped, punctuation-trimmed) message.
  # Extend freely here — no code change needed.
  feedback_positive_keywords:
    # Portuguese
    - "obrigado"
    - "obrigada"
    - "obg"
    - "obgd"
    - "brigado"
    - "brigada"
    - "valeu"
    - "vlw"
    - "agradecido"
    - "agradecida"
    - "gratidao"
    - "muito obrigado"
    - "muito obrigada"
    - "ajudou"
    - "ajudou muito"
    - "top"
    - "perfeito"
    - "show"
    - "otimo"
    - "maravilha"
    # English
    - "thanks"
    - "thank you"
    - "thx"
    - "ty"
    - "tks"
    - "cheers"
    - "appreciate it"
    - "great"
    - "perfect"
    # French
    - "merci"
    - "merci beaucoup"
    - "mercii"
    - "parfait"
    # Spanish
    - "gracias"
    - "muchas gracias"
    # Emoji-only replies
    - "🙏"
    - "👍"
    - "❤️"
    - "🥰"
  # Anti-ban hardening layer: account-wide send pacing, connection-health risk
  # scoring, a post-repair warm-up safety valve, and operator alerting. day1_limit
  # is a FLOOR (200/day) not a target — a reply-only bot's normal DM volume never
  # gets close, so warm-up stays inert and only clamps an anomalous burst (bug or
  # abuse) right when a freshly (re)paired number is most fragile. See
  # .specs/features/whatsapp-antiban-hardening/design.md for full rationale.
  antiban:
    account: # account-wide RateLimiter (vendored defaults shown)
      max_per_minute: 8
      max_per_hour: 200
      max_per_day: 1500
      min_delay_ms: 1500
      max_delay_ms: 5000
    health:
      disconnect_warning_threshold: 3
      disconnect_critical_threshold: 5
      failed_message_threshold: 5
      auto_pause_at: "critical" # reply-only bot: never pause below critical
      hard_pause_enabled: false # default OFF — elevated risk slows, does not stop
    warmup:
      enabled: true
      day1_limit: 200 # FLOOR: well above community volume → inert in normal use
      warmup_days: 7
      inactivity_threshold_hours: 72
    alerts:
      min_risk_level: "high" # alert on high+ only (medium is noisy)
      cooldown_ms: 300000 # 5 min between alerts
      transport: "telegram"

# ── Search & Ranking (single source of truth for tuning) ─────────────────────
search:
  dense_prefetch_k: 80
  sparse_prefetch_k: 120
  fused_k: 50
  top_k: 5
  w_dense: 0.7
  w_sparse: 0.3
  rrf_k: 60
  # Relevance gate: minimum dense cosine similarity (query↔stored question) for a
  # chunk to be kept. If no chunk clears this floor the agent returns the no-results
  # fallback without an LLM synthesis call. This is a *backstop* — clearly off-topic
  # queries are already rejected upstream by intent classification (out_of_scope),
  # so this floor only guards qa-intent questions with weak retrieval.
  # Tuned for OpenAI text-embedding-3-small: on the 38-case golden set the lowest
  # true-positive top dense = 0.6504 (with category filter). 0.55 leaves ~0.10 margin
  # so the agent's query rephrasing can't gate real matches, while still dropping
  # genuinely weak retrievals.
  min_relevance: 0.55

ranking:
  anchor_bonus: 0.05
  rerank_top_k: 40
  date_decay_lambda: 0.0005
  min_token_length: 4

# ── Web search (Tavily) — lower-priority, Grenoble-scoped secondary source ────
# Preferred source is always the Qdrant KB; web is used for factual/current/
# generalist Grenoble info or to confirm possibly-outdated facts. TAVILY_API_KEY
# is env-only (see .env.example); a missing key disables the tool (no crash).
web_search:
  enabled: true
  max_results: 3
  search_depth: "basic" # "basic" | "advanced"
  topic: "general" # tavily topic
  location_suffix: "Grenoble France" # appended to enforce geo scope
  timeout_seconds: 8
  answer_confidence: 0.5 # confidence assigned to a web-only (no-KB) answer
  api_url: "https://api.tavily.com/search"

# ── Agent orchestration ──────────────────────────────────────────────────────
agent:
  max_react_iterations: 5
  max_history: 5
  temperature: 0.0

# ── Response cache ───────────────────────────────────────────────────────────
cache:
  enabled: true
  max_size: 256
  ttl_seconds: 3600

# ── Observability ───────────────────────────────────────────────────────────
logging:
  interaction_path: "logs/interactions.jsonl"
  rotation: "10 MB"
  retention: "30 days"

# ── Control Center (ops dashboard, kill switch, cost alerting) ───────────────
admin:
  # ADMIN_TOKEN env var only — never a plaintext default in yaml

pricing:
  # Per-model USD rates — MUST be updated if llm.model_name changes, since cost
  # tracking multiplies token counts by these. Values below are
  # google/gemini-2.5-flash-lite (OpenRouter list price).
  input_per_1m_usd: 0.10
  output_per_1m_usd: 0.40

alerts:
  interval_seconds: 60
  daily_cost_limit_usd: 5.0
  monthly_budget_usd: 120.0
  health_grace_checks: 3
  auto_disable_enabled: true
  # email_to / smtp_host / smtp_port / smtp_user / smtp_from / SMTP_PASSWORD
  # are env-only (see .env.example) — they identify a real mailbox, so they
  # never go in a checked-in file.

